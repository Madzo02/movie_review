<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1">

    <title>Filmotip | Watchlist</title>

    <meta name="description" content="Discover movie reviews, ratings, and recommendations on Filmotip. Find your next favorite movie.">
	<meta name="keywords" content="movies, reviews, film ratings, movie recommendations, filmotip">
	<meta name="author" content="Filmotip">

    <link rel="icon" type="image/png" href="img/logo.png" />

    <link href="http://fonts.googleapis.com/css?family=Roboto:300,400,700|" rel="stylesheet" type="text/css">
    <link href="fonts/font-awesome.min.css" rel="stylesheet" type="text/css">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div id="site-content">
        <header class="site-header">
        </header>
        <main class="main-content" id="watchlist-page">
            <div class="container">
                <div class="page">
                    <h2 class="section-title">My watchlist</h2>
                    <div class="filters">
                        <select name="sort" id="filter-sort" placeholder="Sort">
                            <option value="asc">A-Z</option>
                            <option value="desc">Z-A</option>
                            <option value="rating">Rating</option>
                        </select>
                        <select name="movie-category" id="filter-category" placeholder="Genres">
                            <option value="0">All Genres</option>
                        </select>
                        <select name="movie-year" id="filter-year">
                            <option value="0">All Years</option>
                        </select>
                    </div>
                    <div class="movie-list" id="watchlist">
                    </div>
                    <div class="pagination" id="pagination">
                    </div>
                </div>
            </div>
        </main>
        <footer class="site-footer">
        </footer>
    </div>
    <div id="wishlist-popup" class="wishlist-popup">
    </div>
    <script src="js/jquery-1.11.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/app.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
